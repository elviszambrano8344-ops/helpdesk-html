<body>

```
<header>
    <h1>Sistema Help Desk</h1>
    <p>Formulario de Reporte de Incidentes</p>
</header>

<nav>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="reportar.html">Reportar Incidente</a></li>
        <li><a href="tickets.html">Tickets</a></li>
    </ul>
</nav>

<main>

    <section class="card">

        <h2>Formulario de Incidentes</h2>

        <article>

            <h3>Registrar Nuevo Incidente</h3>

            <form>

                <label for="titulo">Título del incidente:</label>
                <input type="text" id="titulo" name="titulo">

                <label for="categoria">Categoría:</label>
                <select id="categoria" name="categoria">
                    <option>Red</option>
                    <option>Hardware</option>
                    <option>Software</option>
                </select>

                <p><strong>Prioridad:</strong></p>

                <input type="radio" id="alta" name="prioridad">
                <label for="alta">Alta</label>

                <br><br>

                <input type="radio" id="media" name="prioridad">
                <label for="media">Media</label>

                <br><br>

                <input type="radio" id="baja" name="prioridad">
                <label for="baja">Baja</label>

                <br><br>

                <label for="descripcion">Descripción del incidente:</label>

                <textarea id="descripcion" name="descripcion" rows="6"></textarea>

                <button type="submit" class="btn-primario">
                    Enviar Reporte
                </button>

            </form>

        </article>

    </section>

</main>

<footer>
    <p>Universidad Técnica de Manabí - Desarrollo de Sistemas Informáticos</p>
</footer>
```
